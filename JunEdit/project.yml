name: JunEdit
options:
  bundleIdPrefix: com.junhe
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  JunEdit:
    type: application
    platform: macOS
    sources:
      - Sources
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.junhe.JunEdit
        PRODUCT_NAME: JunEdit
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        COMBINE_HIDPI_IMAGES: YES
        CODE_SIGN_ENTITLEMENTS: Resources/JunEdit.entitlements
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: JunEdit
        CFBundleDisplayName: JunEdit
        CFBundleIdentifier: com.junhe.JunEdit
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: JunEdit
        LSMinimumSystemVersion: "13.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
    dependencies: []
