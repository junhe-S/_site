<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title }} – Jun He</title>
<style>
  @font-face {
    font-family: 'STIX Two Text';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url(https://fonts.gstatic.com/s/stixtwotext/v12/YA9Gr02F12Xkf5whdwKf11l0p7uWhf8lJUzXZT2omsvbURVuMkWDmSo.woff2) format('woff2');
  }
  @font-face {
    font-family: 'STIX Two Text';
    font-style: normal;
    font-weight: 500;
    font-display: swap;
    src: url(https://fonts.gstatic.com/s/stixtwotext/v12/YA9Gr02F12Xkf5whdwKf11l0p7uWhf8lJUzXZT2omsvbURVuMkWDmSo.woff2) format('woff2');
  }
  @font-face {
    font-family: 'STIX Two Text Fallback';
    src: local('Times New Roman');
    ascent-override: 72.67%;
    descent-override: 22.7%;
    line-gap-override: 23.84%;
    size-adjust: 104.86%;
  }
</style>
<link rel="stylesheet" href="/styles.css">
<link rel="stylesheet" href="/article.css">
{% if has_tables %}
<link href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
{% endif %}
</head>
<body>

<header class="site-header">
  <nav>
    <a href="/" class="nav-name">Jun He</a>
    <a href="/posts">Post</a>
    <a href="/research">Research</a>
    <a href="/data">Data</a>
  </nav>
  <button class="theme-toggle" aria-label="Toggle theme" onclick="toggleTheme()">🌞</button>
</header>

<article class="article-layout">
  <div class="article-main">
    <div class="article-header">
      <h1>{{ title }}</h1>
      <div class="article-meta">
        <span>{{ author }}</span>
        <span>{{ date_display }}</span>
      </div>
      {% if tags %}
      <div class="article-tags">
        {% for tag in tags %}
        <span class="tag">{{ tag }}</span>
        {% endfor %}
      </div>
      {% endif %}
    </div>

    {{ content }}
  </div>

  {% if toc %}
  <aside class="article-toc">
    <nav>
      <h4>On this page</h4>
      <ul>
        {{ toc }}
      </ul>
    </nav>
  </aside>
  {% endif %}
</article>

{% if table_ids %}
<script>
$(document).ready(function() {
  {% for tid in table_ids %}
  $('#{{ tid }}').DataTable({ pageLength: 10, order: [], columnDefs: [{ className: 'dt-center', targets: '_all' }] });
  {% endfor %}
});
</script>
{% endif %}

<script src="/theme.js"></script>
</body>
</html>
