## I. Introduction

This paper studies how firm-specific shocks are transmitted through bank lending networks and their impact on stock returns. We examine the role of shared lenders in propagating information across firms.

## II. Data

We use loan-level data from DealScan matched with CRSP stock returns. Our sample covers the period from 1990 to 2023.

### Data Sources

- **DealScan**: Loan-level data on syndicated lending
- **CRSP**: Daily and monthly stock returns
- **Compustat**: Firm-level financial data

### Sample Construction

We identify firms connected through shared lead arrangers. Two firms are considered connected if they share a lead arranger within the past 3 years.

## III. Methodology

We employ a difference-in-differences design to isolate the effect of bank-transmitted shocks on connected firms' stock returns.

### Identification Strategy

Our identification relies on the timing of loan origination relative to firm-specific shocks. We compare the stock returns of connected vs. unconnected firms following a shock to one firm in the network.

## IV. Results

Connected firms experience significant abnormal returns following shocks to their network peers. The effect is:

- Stronger for firms with **fewer alternative information sources**
- Concentrated in the **first week** following the shock
- Robust to controls for industry and geographic proximity

## V. Conclusion

Bank lending networks serve as important channels for information transmission in equity markets. Our findings have implications for understanding market efficiency and the role of financial intermediaries.
